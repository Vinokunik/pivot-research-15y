name: Pivot Research 15y
on:
  workflow_dispatch: # Запуск вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas gspread google-auth

      - name: Run research
        env:
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python research_trading.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: pivot-tables
          path: |
            trade_model_tickers.csv
            trade_model_rating.csv
