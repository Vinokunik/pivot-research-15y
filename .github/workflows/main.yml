name: Pivot Research 15y
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Обновили до 3.10

      - name: Install dependencies
        run: pip install yfinance pandas gspread google-auth openpyxl # Добавили openpyxl

      - name: Run research
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python research_trading.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: pivot-results
          path: "*.xlsx" # Ищем все Excel файлы
